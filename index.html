<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BATTLEZONE BD — Tournament Hub</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Teko:wght@400;500;600;700&family=Hind+Siliguri:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #050a0f;
    --surface: #0a1520;
    --card: #0d1e2e;
    --border: #1a3a5c;
    --accent: #00d4ff;
    --accent2: #ff6b00;
    --accent3: #00ff88;
    --danger: #ff2244;
    --text: #e0f0ff;
    --muted: #6a8fa8;
    --gold: #ffd700;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Hind Siliguri', sans-serif;
    overflow-x: hidden;
    min-height: 100vh;
  }

  /* SCANLINE OVERLAY */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,212,255,0.015) 2px, rgba(0,212,255,0.015) 4px);
    pointer-events: none;
    z-index: 9999;
  }

  /* ANIMATED BG */
  .bg-grid {
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,212,255,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,212,255,0.04) 1px, transparent 1px);
    background-size: 50px 50px;
    animation: gridMove 20s linear infinite;
    pointer-events: none;
    z-index: 0;
  }
  @keyframes gridMove { from { transform: translateY(0); } to { transform: translateY(50px); } }

  /* HEADER */
  header {
    position: relative;
    z-index: 10;
    padding: 0 24px;
    background: linear-gradient(180deg, rgba(0,0,0,0.9) 0%, transparent 100%);
    border-bottom: 1px solid var(--border);
  }
  .header-inner {
    max-width: 1100px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 70px;
  }
  .logo {
    font-family: 'Teko', sans-serif;
    font-size: 2rem;
    font-weight: 700;
    letter-spacing: 3px;
    background: linear-gradient(90deg, var(--accent), var(--accent3));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    text-decoration: none;
  }
  .logo span { color: var(--accent2); -webkit-text-fill-color: var(--accent2); }
  .live-badge {
    display: flex;
    align-items: center;
    gap: 8px;
    background: rgba(255,34,68,0.15);
    border: 1px solid var(--danger);
    border-radius: 20px;
    padding: 5px 14px;
    font-size: 0.78rem;
    font-weight: 600;
    color: var(--danger);
    letter-spacing: 1px;
  }
  .live-dot {
    width: 8px; height: 8px;
    background: var(--danger);
    border-radius: 50%;
    animation: pulse 1.2s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.4;transform:scale(1.4)} }

  /* HERO */
  .hero {
    position: relative;
    z-index: 5;
    text-align: center;
    padding: 70px 24px 50px;
    overflow: hidden;
  }
  .hero::before {
    content: '';
    position: absolute;
    top: -100px; left: 50%;
    transform: translateX(-50%);
    width: 600px; height: 400px;
    background: radial-gradient(ellipse, rgba(0,212,255,0.12) 0%, transparent 70%);
    pointer-events: none;
  }
  .hero-tag {
    display: inline-block;
    background: rgba(0,212,255,0.1);
    border: 1px solid rgba(0,212,255,0.4);
    color: var(--accent);
    font-size: 0.75rem;
    letter-spacing: 3px;
    font-weight: 600;
    padding: 6px 18px;
    border-radius: 20px;
    margin-bottom: 20px;
    text-transform: uppercase;
  }
  .hero h1 {
    font-family: 'Teko', sans-serif;
    font-size: clamp(2.8rem, 8vw, 5.5rem);
    font-weight: 700;
    line-height: 1;
    letter-spacing: 2px;
    margin-bottom: 14px;
  }
  .hero h1 .line1 { color: #fff; }
  .hero h1 .line2 {
    background: linear-gradient(90deg, var(--accent), var(--accent3));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .hero p {
    color: var(--muted);
    font-size: 1.05rem;
    max-width: 500px;
    margin: 0 auto 30px;
    line-height: 1.6;
  }
  .scroll-cta {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    background: linear-gradient(135deg, var(--accent), #0099bb);
    color: #000;
    font-family: 'Rajdhani', sans-serif;
    font-weight: 700;
    font-size: 1rem;
    letter-spacing: 1.5px;
    padding: 13px 32px;
    border-radius: 4px;
    text-decoration: none;
    text-transform: uppercase;
    transition: all 0.2s;
    box-shadow: 0 0 25px rgba(0,212,255,0.3);
  }
  .scroll-cta:hover { transform: translateY(-2px); box-shadow: 0 0 40px rgba(0,212,255,0.5); }

  /* DAILY SCHEDULE TICKER */
  .ticker-wrap {
    position: relative;
    z-index: 5;
    background: rgba(0,212,255,0.06);
    border-top: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
    padding: 10px 0;
    overflow: hidden;
    white-space: nowrap;
  }
  .ticker-inner {
    display: inline-block;
    animation: ticker 30s linear infinite;
    font-family: 'Rajdhani', sans-serif;
    font-size: 0.85rem;
    letter-spacing: 1px;
    color: var(--accent);
  }
  .ticker-inner span { margin: 0 40px; }
  .ticker-inner span b { color: var(--accent2); }
  @keyframes ticker { from { transform: translateX(100vw); } to { transform: translateX(-100%); } }

  /* MAIN */
  main {
    position: relative;
    z-index: 5;
    max-width: 1100px;
    margin: 0 auto;
    padding: 40px 20px 80px;
  }

  /* SECTION HEADER */
  .section-header {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 28px;
  }
  .section-header::after {
    content: '';
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, var(--border), transparent);
  }
  .section-title {
    font-family: 'Teko', sans-serif;
    font-size: 1.8rem;
    font-weight: 600;
    letter-spacing: 2px;
    color: var(--text);
    text-transform: uppercase;
  }
  .section-icon { font-size: 1.5rem; }

  /* MATCH CARDS GRID */
  .games-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
    gap: 20px;
    margin-bottom: 50px;
  }

  .game-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    transition: transform 0.25s, box-shadow 0.25s;
    position: relative;
  }
  .game-card:hover {
    transform: translateY(-4px);
    box-shadow: 0 12px 40px rgba(0,0,0,0.5);
  }
  .game-card .card-glow {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
  }
  .card-br .card-glow { background: linear-gradient(90deg, #ff4444, #ff8800); }
  .card-cs .card-glow { background: linear-gradient(90deg, #ffd700, #ffaa00); }
  .card-lw .card-glow { background: linear-gradient(90deg, #00ff88, #00aaff); }

  .card-header {
    padding: 20px 20px 14px;
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .game-icon {
    width: 52px; height: 52px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.6rem;
    flex-shrink: 0;
  }
  .card-br .game-icon { background: rgba(255,68,68,0.15); border: 1px solid rgba(255,68,68,0.3); }
  .card-cs .game-icon { background: rgba(255,215,0,0.1); border: 1px solid rgba(255,215,0,0.3); }
  .card-lw .game-icon { background: rgba(0,255,136,0.1); border: 1px solid rgba(0,255,136,0.3); }

  .game-meta h3 {
    font-family: 'Rajdhani', sans-serif;
    font-size: 1.25rem;
    font-weight: 700;
    letter-spacing: 1px;
  }
  .card-br h3 { color: #ff6644; }
  .card-cs h3 { color: #ffd700; }
  .card-lw h3 { color: #00ff88; }
  .game-meta p { color: var(--muted); font-size: 0.82rem; margin-top: 2px; }

  .daily-count {
    margin-left: auto;
    text-align: right;
  }
  .daily-count .num {
    font-family: 'Teko', sans-serif;
    font-size: 2rem;
    font-weight: 700;
    line-height: 1;
    color: var(--accent);
  }
  .daily-count .label { font-size: 0.7rem; color: var(--muted); letter-spacing: 1px; }

  .card-divider { height: 1px; background: var(--border); margin: 0 20px; }

  /* MODE TABS */
  .modes {
    padding: 16px 20px 20px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .mode-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 6px;
    padding: 12px 16px;
    gap: 10px;
    transition: border-color 0.2s, background 0.2s;
  }
  .mode-row:hover { border-color: rgba(0,212,255,0.3); background: rgba(0,212,255,0.04); }
  .mode-name {
    font-family: 'Rajdhani', sans-serif;
    font-size: 1rem;
    font-weight: 600;
    letter-spacing: 0.5px;
    flex: 1;
  }
  .mode-badge {
    font-size: 0.7rem;
    font-weight: 700;
    letter-spacing: 1px;
    padding: 3px 10px;
    border-radius: 20px;
    text-transform: uppercase;
  }
  .badge-solo { background: rgba(0,212,255,0.15); color: var(--accent); border: 1px solid rgba(0,212,255,0.3); }
  .badge-duo { background: rgba(255,107,0,0.15); color: var(--accent2); border: 1px solid rgba(255,107,0,0.3); }
  .badge-squad { background: rgba(255,215,0,0.15); color: var(--gold); border: 1px solid rgba(255,215,0,0.3); }

  .fee-win {
    text-align: right;
    min-width: 90px;
  }
  .fee { font-size: 0.75rem; color: var(--muted); }
  .fee b { color: var(--accent2); font-size: 0.9rem; }
  .win { font-size: 0.75rem; color: var(--muted); margin-top: 2px; }
  .win b { color: var(--accent3); font-size: 0.9rem; }

  .join-btn {
    display: block;
    width: calc(100% - 40px);
    margin: 0 20px 20px;
    background: linear-gradient(135deg, rgba(0,212,255,0.1), rgba(0,212,255,0.05));
    border: 1px solid rgba(0,212,255,0.4);
    color: var(--accent);
    font-family: 'Rajdhani', sans-serif;
    font-size: 0.95rem;
    font-weight: 700;
    letter-spacing: 2px;
    padding: 12px;
    border-radius: 6px;
    cursor: pointer;
    text-transform: uppercase;
    transition: all 0.2s;
  }
  .join-btn:hover {
    background: var(--accent);
    color: #000;
    box-shadow: 0 0 20px rgba(0,212,255,0.4);
  }

  /* MODAL */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    backdrop-filter: blur(6px);
    z-index: 1000;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
  }
  .modal-overlay.active {
    opacity: 1;
    pointer-events: all;
  }
  .modal {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    width: 100%;
    max-width: 480px;
    max-height: 90vh;
    overflow-y: auto;
    transform: translateY(30px);
    transition: transform 0.3s;
    position: relative;
  }
  .modal-overlay.active .modal { transform: translateY(0); }

  .modal-top-bar {
    height: 4px;
    background: linear-gradient(90deg, var(--accent), var(--accent3));
    border-radius: 12px 12px 0 0;
  }
  .modal-header {
    padding: 20px 24px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
  }
  .modal-title {
    font-family: 'Teko', sans-serif;
    font-size: 1.6rem;
    font-weight: 600;
    letter-spacing: 2px;
    color: var(--text);
  }
  .modal-close {
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--border);
    color: var(--muted);
    width: 34px; height: 34px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 1.1rem;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
  }
  .modal-close:hover { background: rgba(255,34,68,0.15); color: var(--danger); border-color: var(--danger); }

  .modal-body { padding: 24px; }

  /* STEPS */
  .steps-indicator {
    display: flex;
    gap: 6px;
    margin-bottom: 28px;
  }
  .step-dot {
    flex: 1;
    height: 4px;
    background: var(--border);
    border-radius: 4px;
    transition: background 0.3s;
  }
  .step-dot.active { background: var(--accent); box-shadow: 0 0 8px rgba(0,212,255,0.5); }
  .step-dot.done { background: var(--accent3); }

  .step { display: none; }
  .step.active { display: block; }

  /* SELECTED GAME INFO */
  .selected-info {
    background: rgba(0,212,255,0.05);
    border: 1px solid rgba(0,212,255,0.2);
    border-radius: 8px;
    padding: 14px 16px;
    margin-bottom: 22px;
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .selected-info .si-icon { font-size: 1.8rem; }
  .selected-info .si-name {
    font-family: 'Rajdhani', sans-serif;
    font-size: 1.1rem;
    font-weight: 700;
    color: var(--accent);
  }
  .selected-info .si-detail { font-size: 0.82rem; color: var(--muted); margin-top: 2px; }
  .selected-info .si-price {
    margin-left: auto;
    text-align: right;
  }
  .selected-info .si-price .amount {
    font-family: 'Teko', sans-serif;
    font-size: 1.8rem;
    font-weight: 700;
    color: var(--gold);
    line-height: 1;
  }
  .selected-info .si-price .unit { font-size: 0.7rem; color: var(--muted); }

  /* PAYMENT BOX */
  .payment-box {
    background: rgba(0,255,136,0.04);
    border: 1px solid rgba(0,255,136,0.2);
    border-radius: 8px;
    padding: 18px;
    margin-bottom: 22px;
  }
  .payment-box h4 {
    font-family: 'Rajdhani', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    color: var(--accent3);
    letter-spacing: 1px;
    margin-bottom: 14px;
    text-transform: uppercase;
  }
  .payment-method {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 11px 14px;
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    border-radius: 6px;
    margin-bottom: 8px;
    cursor: pointer;
    transition: border-color 0.2s;
  }
  .payment-method:hover { border-color: rgba(0,255,136,0.4); }
  .payment-method.selected { border-color: var(--accent3); background: rgba(0,255,136,0.06); }
  .copy-btn {
    display: flex;
    align-items: center;
    gap: 5px;
    background: rgba(0,212,255,0.1);
    border: 1px solid rgba(0,212,255,0.35);
    color: var(--accent);
    font-family: 'Hind Siliguri', sans-serif;
    font-size: 0.75rem;
    font-weight: 600;
    padding: 6px 11px;
    border-radius: 5px;
    cursor: pointer;
    flex-shrink: 0;
    transition: all 0.2s;
    white-space: nowrap;
    margin-left: 6px;
  }
  .copy-btn:hover { background: rgba(0,212,255,0.2); border-color: var(--accent); }
  .copy-btn.copied { background: rgba(0,255,136,0.15); border-color: var(--accent3); color: var(--accent3); }

  /* ===== BKASH LOGO ===== */
  .logo-bkash {
    background: #E2136E;
    border-radius: 7px;
    padding: 5px 10px 5px 8px;
    display: flex;
    align-items: baseline;
    gap: 0px;
    flex-shrink: 0;
    box-shadow: 0 2px 8px rgba(226,19,110,0.4);
  }
  .bk-b {
    font-family: 'Georgia', serif;
    font-size: 1.15rem;
    font-weight: 900;
    font-style: italic;
    color: #fff;
    line-height: 1;
  }
  .bk-k {
    font-family: 'Arial Black', sans-serif;
    font-size: 1rem;
    font-weight: 900;
    color: #fff;
    line-height: 1;
  }
  .bk-ash {
    font-family: 'Arial', sans-serif;
    font-size: 0.95rem;
    font-weight: 700;
    color: rgba(255,255,255,0.9);
    line-height: 1;
  }

  /* ===== NAGAD LOGO ===== */
  .logo-nagad {
    background: linear-gradient(135deg, #F05A28 60%, #e04418 100%);
    border-radius: 7px;
    padding: 5px 10px;
    display: flex;
    align-items: center;
    gap: 5px;
    flex-shrink: 0;
    position: relative;
    box-shadow: 0 2px 8px rgba(240,90,40,0.4);
    overflow: hidden;
  }
  .logo-nagad::before {
    content: '';
    position: absolute;
    top: -8px; right: -8px;
    width: 28px; height: 28px;
    background: #FFCC00;
    border-radius: 50%;
  }
  .logo-nagad::after {
    content: '৳';
    position: absolute;
    top: 2px; right: 4px;
    font-size: 0.7rem;
    font-weight: 900;
    color: #F05A28;
    z-index: 1;
  }
  .ng-text {
    font-family: 'Arial Black', sans-serif;
    font-size: 0.95rem;
    font-weight: 900;
    color: #fff;
    letter-spacing: -0.5px;
    text-transform: lowercase;
    z-index: 1;
    position: relative;
  }

  .pm-dot {
    width: 16px; height: 16px;
    border: 2px solid var(--border);
    border-radius: 50%;
    flex-shrink: 0;
    transition: all 0.2s;
  }
  .payment-method.selected .pm-dot {
    border-color: var(--accent3);
    background: var(--accent3);
    box-shadow: 0 0 8px rgba(0,255,136,0.5);
  }
  .pm-label { font-weight: 600; font-size: 0.95rem; flex: 1; }
  .pm-num {
    font-family: 'Rajdhani', sans-serif;
    font-weight: 700;
    color: var(--accent);
    font-size: 1rem;
    letter-spacing: 1px;
  }

  .payment-instruction {
    background: rgba(255,107,0,0.08);
    border: 1px solid rgba(255,107,0,0.25);
    border-radius: 6px;
    padding: 12px 14px;
    margin-top: 14px;
    font-size: 0.83rem;
    color: #ffaa66;
    line-height: 1.7;
  }
  .payment-instruction strong { color: var(--accent2); }

  /* FORM */
  .form-group { margin-bottom: 18px; }
  .form-label {
    display: block;
    font-size: 0.8rem;
    font-weight: 600;
    letter-spacing: 1px;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 7px;
  }
  .form-input {
    width: 100%;
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 12px 14px;
    color: var(--text);
    font-family: 'Hind Siliguri', sans-serif;
    font-size: 0.95rem;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .form-input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(0,212,255,0.1);
  }
  .form-input::placeholder { color: #3a5a72; }
  .form-input.error { border-color: var(--danger); }
  .form-hint { font-size: 0.75rem; color: var(--muted); margin-top: 5px; line-height: 1.5; }
  .form-hint .highlight { color: var(--accent2); font-weight: 600; }

  /* MODAL BUTTONS */
  .modal-actions { display: flex; gap: 10px; margin-top: 8px; }
  .btn-primary {
    flex: 1;
    background: linear-gradient(135deg, var(--accent), #0099bb);
    color: #000;
    font-family: 'Rajdhani', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    letter-spacing: 2px;
    padding: 13px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    text-transform: uppercase;
    transition: all 0.2s;
    box-shadow: 0 0 20px rgba(0,212,255,0.2);
  }
  .btn-primary:hover { box-shadow: 0 0 30px rgba(0,212,255,0.4); transform: translateY(-1px); }
  .btn-secondary {
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'Rajdhani', sans-serif;
    font-size: 0.95rem;
    font-weight: 600;
    padding: 13px 20px;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.2s;
    text-transform: uppercase;
  }
  .btn-secondary:hover { border-color: rgba(255,255,255,0.2); color: var(--text); }

  /* VERIFY STEP */
  .verify-box {
    background: rgba(0,212,255,0.05);
